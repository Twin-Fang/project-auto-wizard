# ===================================================================
# PROJECT-COMMON-RELEASE-PUBLISH.yaml
# Tag + GitHub Release publisher (dual-mode)
# ===================================================================
#
# Publishes a git tag (vX.Y.Z) and a GitHub Release for every release
# that lands on {{MAIN_BRANCH}}. Two branch modes, read from version.yml
# (metadata.template.branches.mode, default: pr-flow):
#
# - pr-flow: releases arrive as merge commits produced by
#   AUTO-CHANGELOG-CONTROL. Only pushes whose head commit message matches
#   the release-confirm pattern "chore(release):" proceed; anything else
#   exits cleanly. Version + changelog were already confirmed in the PR.
#
# - trunk-based: every direct push to {{MAIN_BRANCH}} is a release.
#   This job bumps the version (patch +1 and sync), summarizes the commits
#   since the last tag with the ai-summary engine chain (user API ->
#   GitHub Models -> rule-based fallback), updates CHANGELOG.json /
#   CHANGELOG.md, and commits everything back with [skip ci].
#
# Common tail (both modes): idempotency guard on the tag, tag push,
# release notes = changelog export (ai_notes) + GitHub generate-notes API
# (contributors/compare links), then gh release create.
#
# Release-confirm pattern: "chore(release):" — keep in sync with
# PROJECT-COMMON-AUTO-CHANGELOG-CONTROL and PROJECT-COMMON-VERSION-CONTROL.
#
# workflow_dispatch republishes the current version (recovery path when a
# previous run failed after the version was confirmed but before the
# release was created). The idempotency guard keeps it safe to re-run.
# ===================================================================

name: PROJECT-RELEASE-PUBLISH

concurrency:
  group: release-publish
  cancel-in-progress: false

on:
  push:
    branches: ["{{MAIN_BRANCH}}"]
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  release:
    name: Tag and publish GitHub Release
    # Bot housekeeping commits never publish releases
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: "{{MAIN_BRANCH}}"

      - name: Git config
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Detect branch mode
        id: mode
        run: |
          MODE=$(python3 -c 'import re; t=open("version.yml",encoding="utf-8").read(); m=re.search(r"^\s*mode:\s*\"?([A-Za-z-]+)", t, re.M); print(m.group(1) if m else "pr-flow")' 2>/dev/null || echo "pr-flow")
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "branch mode: $MODE"

      - name: Release gate
        id: gate
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          EVENT="${{ github.event_name }}"
          HEAD_MSG=$(git log -1 --pretty=%B)
          PROCEED=false

          if [ "$EVENT" = "workflow_dispatch" ]; then
            # manual republish of the current version
            PROCEED=true
          elif [ "$MODE" = "trunk-based" ]; then
            # every non-[skip ci] push to {{MAIN_BRANCH}} is a release
            PROCEED=true
          elif echo "$HEAD_MSG" | grep -q "chore(release):"; then
            # pr-flow: only release-confirm merges publish a release
            # (pattern shared with AUTO-CHANGELOG-CONTROL / VERSION-CONTROL)
            PROCEED=true
          fi

          echo "proceed=$PROCEED" >> $GITHUB_OUTPUT
          if [ "$PROCEED" = "true" ]; then
            echo "release gate open (mode=$MODE, event=$EVENT)"
          else
            echo "not a release-confirm push in pr-flow mode — skipping (clean exit)"
          fi

      - name: Trunk-based version bump + changelog
        if: >-
          steps.gate.outputs.proceed == 'true' &&
          steps.mode.outputs.mode == 'trunk-based' &&
          github.event_name == 'push'
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_BASE_URL: ${{ vars.AI_API_BASE_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          NEW_VERSION=$(python3 .github/scripts/version_manager.py increment | tail -n 1)
          if [ -z "$NEW_VERSION" ]; then
            echo "version bump failed"
            exit 1
          fi
          python3 .github/scripts/version_manager.py sync
          echo "release version: $NEW_VERSION"

          # Commits since the last tag (fall back to full history on first release)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            echo "collecting commits since $LAST_TAG"
            git log --pretty=%s "${LAST_TAG}..HEAD" > commits.txt
          else
            echo "no previous tag — collecting the full history"
            git log --pretty=%s > commits.txt
          fi

          python3 .github/scripts/changelog_manager.py ai-summary \
            --commits-file commits.txt \
            --version "$NEW_VERSION" \
            --output summary.md

          # Same input channel as AUTO-CHANGELOG-CONTROL:
          # update-from-summary reads ./pr_body.md
          cp summary.md pr_body.md

          PROJECT_TYPE=$(grep "^project_type:" version.yml | sed 's/project_type: *"\([^"]*\)".*/\1/' || echo "unknown")
          PROJECT_TYPES=$(grep "^project_types:" version.yml 2>/dev/null | sed -E 's/.*\[([^]]*)\].*/\1/' | tr -d '" ' || echo "")
          if [ -z "$PROJECT_TYPES" ]; then
            PROJECT_TYPES="$PROJECT_TYPE"
          fi

          export VERSION="$NEW_VERSION"
          export PROJECT_TYPE PROJECT_TYPES
          export TODAY=$(date '+%Y-%m-%d')
          export TIMESTAMP=$(date '+%Y-%m-%dT%H:%M:%SZ')

          python3 .github/scripts/changelog_manager.py update-from-summary
          python3 .github/scripts/changelog_manager.py generate-md

          rm -f pr_body.md summary.md commits.txt

          git add -A
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore(version): release v${NEW_VERSION} docs [skip ci]"

            # Race-condition guard: pull-rebase then push (up to 3 retries)
            MAX_RETRIES=3
            RETRY_COUNT=0
            PUSH_SUCCESS=false

            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "push attempt $RETRY_COUNT/$MAX_RETRIES..."

              if git push origin HEAD:{{MAIN_BRANCH}}; then
                PUSH_SUCCESS=true
                echo "release docs pushed"
                break
              else
                echo "push failed, syncing with remote..."
                if git pull --rebase origin {{MAIN_BRANCH}}; then
                  echo "rebase ok, retrying push..."
                else
                  echo "rebase failed, manual conflict resolution required"
                  git rebase --abort 2>/dev/null || true
                  exit 1
                fi
              fi
            done

            if [ "$PUSH_SUCCESS" = false ]; then
              echo "push failed after $MAX_RETRIES attempts"
              exit 1
            fi
          fi

      - name: Resolve version + idempotency guard
        id: version
        if: steps.gate.outputs.proceed == 'true'
        run: |
          VERSION=$(python3 .github/scripts/version_manager.py get | tail -n 1)
          if [ -z "$VERSION" ]; then
            echo "failed to read version"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          git fetch --tags origin

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "tag v$VERSION already exists — release already published, nothing to do"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "publishing v$VERSION"
          fi

      - name: Create and push tag
        if: steps.gate.outputs.proceed == 'true' && steps.version.outputs.exists != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"
          echo "tag v$VERSION pushed"

      - name: Build release notes (changelog export + GitHub generate-notes)
        if: steps.gate.outputs.proceed == 'true' && steps.version.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # AI/changelog notes for this version
          python3 .github/scripts/changelog_manager.py export --version "$VERSION" --output ai_notes.md || true

          # GitHub-generated notes (contributors, compare link). Deliberately
          # via the API instead of --generate-notes so both sources can be
          # concatenated into a single notes file.
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="v$VERSION" --jq '.body' > gh_notes.md || true

          {
            if [ -s ai_notes.md ]; then
              cat ai_notes.md
              echo ""
            fi
            if [ -s gh_notes.md ]; then
              echo "---"
              echo ""
              cat gh_notes.md
            fi
          } > notes.md

          if [ ! -s notes.md ]; then
            echo "Release v$VERSION" > notes.md
          fi

          echo "release notes assembled ($(wc -c < notes.md) bytes)"

      - name: Create GitHub Release
        if: steps.gate.outputs.proceed == 'true' && steps.version.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v$VERSION" --title "v$VERSION" --notes-file notes.md
          echo "GitHub Release v$VERSION published"

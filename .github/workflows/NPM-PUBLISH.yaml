# ===================================================================
# NPM-PUBLISH.yaml
# project-auto-wizard npm 자동 배포 워크플로우
# ===================================================================
#
# 동작:
# - main 기준으로 version.yml 버전을 읽어 package.json에 주입 후 npm publish
# - 이미 레지스트리에 있는 버전이면 성공 종료 (멱등)
#
# 트리거: main 브랜치 push 시 (+ 수동 실행)
# 필요 Secret: NPM_TOKEN (npm Granular Access Token, 2FA bypass 허용)
# ===================================================================

name: NPM-PUBLISH

concurrency:
  group: npm-publish
  cancel-in-progress: false

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: npm 패키지 배포
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃 (main 기준)
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: version.yml에서 버전 추출
        id: version
        run: |
          VERSION=$(python3 payload/scripts/version_manager.py get | tail -n 1)
          if [ -z "$VERSION" ]; then
            echo "version.yml에서 버전을 추출할 수 없습니다"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "배포 대상 버전: $VERSION"

      - name: package.json 버전 주입
        run: npm pkg set version=${{ steps.version.outputs.version }}

      - name: 이미 배포된 버전인지 확인 (멱등)
        id: check
        run: |
          PKG_NAME=$(npm pkg get name | tr -d '"')
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "${PKG_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "${PKG_NAME}@${VERSION} 은 이미 배포되어 있습니다. 건너뜁니다."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: npm 배포
        if: steps.check.outputs.skip == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 배포 결과 요약
        if: steps.check.outputs.skip == 'false'
        run: echo "project-auto-wizard@${{ steps.version.outputs.version }} npm 배포 완료"
